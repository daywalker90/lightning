name: Docker build (reusable)

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      repository-name:
        type: string
        default: 'elementsproject'
      platforms-to-build:
        type: string
        default: 'linux/amd64,linux/arm64,linux/arm/v7'

jobs:
  build:
    name: Build ${{ matrix.target }} (push by digest, untagged)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: lightningd
            tag_suffix: ''
          - target: lightningd-vls-signer
            tag_suffix: '-vls'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        target: ${{ matrix.target }}
        platforms: ${{ inputs.platforms-to-build }}
        build-args: |
          VERSION=${{ inputs.version }}
        outputs: type=image,name=${{ inputs.repository-name }}/lightningd,push-by-digest=true,name-canonical=true,push=true
        cache-from: type=gha,scope=${{ matrix.target }}
        cache-to: type=gha,mode=max,scope=${{ matrix.target }}

    - name: Save digest for publish step
      run: |
        mkdir -p /tmp/digests
        {
          echo "${{ steps.build.outputs.digest }}"
          echo "REPONAME=${{ inputs.repository-name }}"
        } > /tmp/digests/digest.txt

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digest-${{ matrix.target }}
        path: /tmp/digests/digest.txt
        if-no-files-found: error
        retention-days: 1
