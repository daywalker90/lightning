---
# https://docs.corelightning.org/docs/release-checklist
name: "Release 🚀"
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+[0-9a-z]+'
      - 'v[0-9]+.[0-9]+.[0-9]+[0-9a-z]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      skip_validation:
        description: Skip release validation for untagged commit testing
        default: false
        type: boolean
      create_release:
        description: Create a draft release
        default: false
        type: boolean
      repository-name:
        description: 'Docker repository name'
        default: 'elementsproject'
        required: false
      platforms-to-build:
        description: 'List of platforms to build'
        default: 'linux/amd64,linux/arm64,linux/arm/v7'
        required: false
      push-latest:
        description: 'Push the latest Docker tag also?'
        default: 'false'
        required: false
      dist-location:
        description: 'PyPI distribution location (test/prod)'
        default: 'test'
        required: false

jobs:
  check-version:
    name: Verify release tag
    uses: ./.github/workflows/check-release-tag.yml

  check:
    name: Validate release content
    needs: check-version
    outputs:
      version: ${{ steps.capture.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            echo "No release version provided and no tag found."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate release
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_validation) }}
        run: tools/check-release.sh --version=${VERSION}

      - name: Capture version output
        id: capture
        run: echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ---- Build phase: all three run in parallel, nothing publishes yet ----

  docker-build:
    name: Docker build
    needs: check
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.check.outputs.version }}
      repository-name: ${{ github.event.inputs.repository-name || 'daywalker990' }}
      platforms-to-build: ${{ github.event.inputs.platforms-to-build || 'linux/amd64,linux/arm64,linux/arm/v7' }}
    secrets: inherit

  pypi-build:
    name: PyPI build
    needs: check
    uses: ./.github/workflows/pypi-build.yml
    secrets: inherit

  release-build:
    name: Release binaries build
    needs: check
    uses: ./.github/workflows/release-build.yml
    with:
      version: ${{ needs.check.outputs.version }}
      skip_validation: ${{ github.event.inputs.skip_validation == 'true' }}
    secrets: inherit

  # ---- Gate: only reachable if ALL THREE builds succeeded ----

  gate:
    name: All builds succeeded
    needs: [docker-build, pypi-build, release-build]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "All three build paths succeeded — proceeding to publish."

  # ---- Publish phase: only starts after the gate ----

  docker-publish:
    name: Docker publish
    needs: [check, gate]
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.check.outputs.version }}
      repository-name: ${{ github.event.inputs.repository-name || 'daywalker990' }}
      push-latest: ${{ github.event.inputs.push-latest || 'false' }}
    secrets: inherit

  pypi-publish:
    name: PyPI publish
    needs: [check, gate]
    uses: ./.github/workflows/pypi-publish.yml
    with:
      dist-location: ${{ github.event.inputs.dist-location || 'test' }}
    secrets: inherit

  release-publish:
    name: Release sign + draft
    needs: [check, gate]
    uses: ./.github/workflows/release-publish.yml
    with:
      version: ${{ needs.check.outputs.version }}
      create_release: ${{ github.event.inputs.create_release == 'true' }}
    secrets: inherit
